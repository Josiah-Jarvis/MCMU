[build-system]
requires = ["hatchling >= 1.26"]
build-backend = "hatchling.build"

[project]
name = "MCModUpdater"
version = "0.1.0"
requires-python = ">=3.11"
authors = [
    {name="Josiah Jarvis"}
]
maintainers = [
    {name="Josiah Jarvis"}
]
description = "Minecraft Mod Updater"
readme = "README.md"
license = "MIT"
keywords = ["Minecraft", "Mods"]


[project.scripts]
mcmodupdater = "__main__:main"

